<!DOCTYPE html>
<html>

<body style="font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333;">
    <div
        style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 5px solid #28a745;">
        <h2 style="color: #28a745; margin-top: 0; font-size: 22px;">System-Aktivierung Erfolgreich, Prüfstand monitoring
            scharf</h2>
        <p style="font-size: 16px; line-height: 1.5; color: #555;">
            Dein ESP32 Prüfstand-Modul hat sich erfolgreich mit dem Netzwerk verbunden und den Mailserver initialisiert.
        </p>

        <table style="width: 100%; margin-top: 25px; border-collapse: collapse; font-size: 15px;">
            <tr>
                <td style="padding: 12px; border-bottom: 1px solid #eee; width: 30%;"><strong>Zeitpunkt:</strong></td>
                <td style="padding: 12px; border-bottom: 1px solid #eee; color: #666;">{{timestamp}}</td>
            </tr>
            <tr>
                <td style="padding: 12px; width: 30%;"><strong>IP-Adresse:</strong></td>
                <td style="padding: 12px; color: #666;"><a href="http://{{device_ip}}"
                        style="color: #0066cc; text-decoration: none;">{{device_ip}}</a></td>
            </tr>
        </table>

        <div
            style="margin-top: 25px; padding: 15px; background-color: #e8f5e9; border-left: 4px solid #4caf50; font-style: italic; color: #2e7d32; font-size: 15px;">
            {{extra_info}}
        </div>

        <div
            style="margin-top: 35px; padding-top: 15px; border-top: 1px solid #eee; font-size: 12px; color: #aaa; text-align: center;">
            Automatisch generierte E-Mail &bull; ESP32 Mailserver
        </div>
    </div>
</body>

</html>
